<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Server Error</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #1e293b; }
    .card { max-width: 28rem; text-align: center; padding: 3rem 2rem; }
    .logo { width: 56px; height: 56px; margin: 0 auto 1.5rem; background: #0f172a; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 32px; height: 32px; }
    .code { font-size: 5rem; font-weight: 800; background: linear-gradient(135deg, #0f172a 0%, #475569 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; line-height: 1; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: #1e293b; }
    p { color: #64748b; margin-bottom: 2rem; line-height: 1.6; font-size: 0.9rem; }
    a { display: inline-block; padding: 0.75rem 2rem; background: #0f172a; color: #fff; border-radius: 0.5rem; text-decoration: none; font-weight: 600; font-size: 0.875rem; transition: background 0.15s; }
    a:hover { background: #1e293b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <g transform="translate(256,256)">
          <path fill="#ffffff" d="M20,-140 A160,160,0,1,0,20,140 A24,24,0,0,1,20,96 A116,116,0,1,1,20,-96 A24,24,0,0,1,20,-140 Z"/>
          <circle fill="#ffffff" cx="-20" cy="0" r="32"/>
        </g>
      </svg>
    </div>
    <div class="code">500</div>
    <h1>Something went wrong</h1>
    <p>We've been notified and are working on it. Please try again in a few minutes.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
