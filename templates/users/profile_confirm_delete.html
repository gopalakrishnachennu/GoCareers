{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-12">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">

    {# Warning Header #}
    <div class="px-6 py-5 bg-gradient-to-r from-red-50 to-rose-50 border-b border-red-100">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-xl bg-red-100 flex items-center justify-center">
          <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-extrabold text-red-900">Confirm Delete</h1>
          <p class="text-xs text-red-600/70">This action cannot be undone</p>
        </div>
      </div>
    </div>

    {# Body #}
    <div class="px-6 py-6">
      <div class="flex items-start gap-3 p-4 rounded-xl bg-gray-50 border border-gray-100 mb-6">
        <svg class="w-5 h-5 text-gray-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        <div>
          <p class="text-sm font-semibold text-gray-800">{{ object }}</p>
          <p class="text-xs text-gray-500 mt-1">This will be permanently removed from the profile. Any generated resumes referencing this entry will not be affected.</p>
        </div>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="flex items-center justify-between gap-3">
          <a href="{{ cancel_url|default:request.META.HTTP_REFERER }}"
             class="px-5 py-2.5 rounded-xl text-sm font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 transition">
            Cancel
          </a>
          <button type="submit"
                  class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white bg-red-600 hover:bg-red-700 shadow-sm transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Delete Permanently
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
