{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Quick submit</h1>
        <p class="text-sm text-gray-600 mb-6">Choose an open job and consultant. You need a generated resume draft for that pair — we’ll open the submission form with it.</p>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="job_id">Job</label>
                <select name="job_id" id="job_id" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-900 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
                    <option value="">— Select —</option>
                    {% for j in jobs %}
                    <option value="{{ j.pk }}">{{ j.title }} · {{ j.company }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="consultant_id">Consultant</label>
                <select name="consultant_id" id="consultant_id" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-900 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
                    {% for c in consultants %}
                    <option value="{{ c.pk }}">{{ c.user.get_full_name|default:c.user.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">Continue to submission</button>
        </form>
    </div>
</div>
{% endblock %}
