name: Build & publish Docker image

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=main
            type=ref,event=tag
          # type=raw,value=main always tags the image as :main on every push.
          # The VPS pulls ghcr.io/repo:main — keeping it simple and predictable.

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — layers are reused across builds.
          # pip install only reruns if requirements.txt changed.
          # npm ci only reruns if package-lock.json changed.
          # npm run build + COPY always reruns (code changed).
          cache-from: type=gha
          cache-to: type=gha,mode=max
