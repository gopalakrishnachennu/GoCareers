name: Run — Mapbox Full Setup + Backfill (one-shot)

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "How far to go: configure / diagnose / test / full"
        required: true
        default: "diagnose"
        type: choice
        options:
          - configure   # only save token + flip provider/enabled flags
          - diagnose    # configure + run check_geocoding_provider live test
          - test        # diagnose + 5-row Mapbox eval on real unknowns
          - full        # everything + backfill all unknown-country rows

jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Configure provider, run diagnostic, optionally backfill
        uses: appleboy/ssh-action@v1.0.3
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          STAGE: ${{ github.event.inputs.stage }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 90m
          script_stop: true
          envs: MAPBOX_TOKEN,STAGE
          script: |
            set -e
            cd /opt/consulting

            if [ -z "${MAPBOX_TOKEN}" ]; then
              echo "ERROR: MAPBOX_TOKEN not received from secrets"
              exit 1
            fi
            echo "Token received from secrets (length=${#MAPBOX_TOKEN})"

            echo ""
            echo "=== Step 1/4: Save token + enable provider ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              exec -T -e MAPBOX_TOKEN="${MAPBOX_TOKEN}" web \
              python manage.py configure_geocoding_provider \
                --provider mapbox --enable --cache --token-env MAPBOX_TOKEN

            if [ "$STAGE" = "configure" ]; then
              echo ""
              echo "Stage=configure complete. Stopping per request."
              exit 0
            fi

            echo ""
            echo "=== Step 2/4: Live diagnostic (Bangalore, India) ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              exec -T web \
              python manage.py check_geocoding_provider --query "Bangalore, India"

            if [ "$STAGE" = "diagnose" ]; then
              echo ""
              echo "Stage=diagnose complete. Stopping per request."
              exit 0
            fi

            echo ""
            echo "=== Step 3/4: 5-row Mapbox test on UNKNOWN rows ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              exec -T web \
              python manage.py evaluate_rawjob_scope \
                --only-unknown --batch-size 5 --limit 5 --provider

            if [ "$STAGE" = "test" ]; then
              echo ""
              echo "Stage=test complete. Stopping per request."
              docker compose -f docker-compose.prod.yml --env-file .env.production \
                exec -T web \
                python manage.py print_scope_summary
              exit 0
            fi

            echo ""
            echo "=== Step 4/4: Full Mapbox backfill on ALL unknown rows ==="
            echo "(quota: 80,000 hard cap; ~5,000 unique strings expected; cached after first hit)"
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              exec -T web \
              python manage.py evaluate_rawjob_scope \
                --only-unknown --batch-size 1000 --provider

            echo ""
            echo "=== FINAL SCOPE DISTRIBUTION ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production \
              exec -T web \
              python manage.py print_scope_summary
