name: Ops - Purge Harvest Test Data

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "false = dry-run, true = purge harvest test data"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      confirm:
        description: "Required for execute=true: DELETE_HARVEST_TEST_DATA"
        required: false
        default: ""

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Dry-run harvest test data purge on production
        if: ${{ github.event.inputs.execute != 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm --no-deps web \
              python manage.py purge_harvest_test_data

      - name: Execute harvest test data purge on production
        if: ${{ github.event.inputs.execute == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm --no-deps web \
              python manage.py purge_harvest_test_data --execute --confirm "${{ github.event.inputs.confirm }}"
