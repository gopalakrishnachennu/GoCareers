name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            # Keep Redis/Postgres up during deploy. Never use `down` here; it
            # interrupts workers and can create avoidable downtime.
            export WEB_CONCURRENCY=2
            export WORKER_CONCURRENCY=2
            export HARVEST_CONCURRENCY=2
            export COMPOSE_PARALLEL_LIMIT=1
            docker compose -f docker-compose.prod.yml --env-file .env.production build
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py shell -c "from django.db import connection; from django.utils import timezone; names=['0028_optimize_indexes','0029_rawjob_category_confidence','0030_rename_platformconfig_to_platformengineconfig','0031_add_rawjob_duplicate_pair','0032_add_content_hash_duplicate_syncstatus','0033_fetchbatch_audit_payload','0034_harvestopsrun','0035_rawjob_vendor_source_fields','0036_board_analytics_support_tier_empty_status','0037_companyfetchrun_detail_fields','0038_rawjob_sync_skip_reason','0039_rawjob_job_domain','0040_rawjob_job_domain_candidates','0041_locationcache_and_more','0042_add_geocoding_provider_token','0043_rawjob_location_candidates_country_codes','0044_harvestopsrun_progress_fields','0045_harvestopsrun_llm_classify_operation','0046_rawjobpayloadsnapshot','0047_engine_runtime_hardening','0048_engine_guardrails_and_audit_flags','0049_platform_registry_metadata_cleanup','0050_harvestengineconfig_ops_controls','0051_fetchbatch_stop_requested','0052_harvestopsrun_heartbeat','0053_harvestengineconfig_helptext_sync']; now=timezone.now(); c=connection.cursor(); c.execute(\"SELECT to_regclass('public.harvest_raw_has_desc_lock_idx')\"); has_0028=bool(c.fetchone()[0]); [c.execute(\"INSERT INTO django_migrations (app, name, applied) SELECT %s, %s, %s WHERE NOT EXISTS (SELECT 1 FROM django_migrations WHERE app=%s AND name=%s)\", ['harvest', name, now, 'harvest', name]) for name in names] if has_0028 else None; c.execute(\"SELECT 1 FROM django_migrations WHERE app='harvest' AND name='0054_harvestfiltersnapshot_harvestrolecategory_and_more'\"); applied_0054=bool(c.fetchone()); [c.execute(sql) for sql in ['DROP TABLE IF EXISTS harvest_harvestskippedtitle CASCADE','DROP TABLE IF EXISTS harvest_harvestrolecategory CASCADE','DROP TABLE IF EXISTS harvest_harvestfiltersnapshot CASCADE']] if not applied_0054 else None; c.close(); print('Forward-only harvest migration recovery prepared')"
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate --no-input
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py shell -c "from harvest.models import HarvestEngineConfig; cfg=HarvestEngineConfig.get(); cfg.worker_concurrency=2; cfg.task_rate_limit=3; cfg.api_stagger_ms=1000; cfg.scraper_stagger_ms=5000; cfg.full_fetch_cooldown_minutes=360; cfg.backfill_jd_workers=1; cfg.auto_backfill_jd=False; cfg.auto_sync_to_pool=False; cfg.save(); print('Applied strict harvest uptime config')"
