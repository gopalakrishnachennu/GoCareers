name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            # Keep Redis/Postgres up during deploy. Never use `down` here; it
            # interrupts workers and can create avoidable downtime.
            set_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env.production; then
                sed -i "s/^${key}=.*/${key}=${value}/" .env.production
              else
                printf '\n%s=%s\n' "$key" "$value" >> .env.production
              fi
            }
            set_env WEB_CONCURRENCY 2
            set_env WORKER_CONCURRENCY 2
            set_env HARVEST_CONCURRENCY 2
            docker compose -f docker-compose.prod.yml --env-file .env.production build
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            if ! docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate --no-input; then
              echo "Primary migrate failed; attempting safe recovery"
              docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate harvest 0027 --fake || true
              docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate --no-input
            fi
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py shell -c "from harvest.models import HarvestEngineConfig; cfg=HarvestEngineConfig.get(); cfg.worker_concurrency=2; cfg.task_rate_limit=3; cfg.api_stagger_ms=1000; cfg.scraper_stagger_ms=5000; cfg.full_fetch_cooldown_minutes=360; cfg.backfill_jd_workers=1; cfg.auto_backfill_jd=False; cfg.auto_sync_to_pool=False; cfg.save(); print('Applied strict harvest uptime config')"
