name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml --env-file .env.production build
            docker compose -f docker-compose.prod.yml --env-file .env.production down --remove-orphans
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d
            if ! docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate --no-input; then
              echo "Primary migrate failed; attempting safe recovery"
              docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate harvest 0027 --fake || true
              docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py migrate --no-input
            fi
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py shell -c "from django.utils import timezone; from datetime import timedelta; from harvest.models import RawJob; from harvest.tasks import backfill_descriptions_task; freed = RawJob.objects.filter(jd_backfill_locked_at__lt=timezone.now()-timedelta(minutes=5)).update(jd_backfill_locked_at=None); missing = RawJob.objects.missing_jd().count(); print(f'JD backfill check: missing={missing}, freed={freed}'); backfill_descriptions_task.delay(batch_size=500, parallel_workers=8) if missing > 0 else None"
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T web python manage.py shell -c "from harvest.tasks import validate_raw_job_urls_task; task = validate_raw_job_urls_task.delay(batch_size=200, concurrency=20); print(f'Validate live links task queued: {task.id}')"
