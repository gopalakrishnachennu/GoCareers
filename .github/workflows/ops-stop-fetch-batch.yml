name: Ops - Stop Fetch Batch

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: "FetchBatch id to stop; blank stops latest active batch"
        required: false
        default: ""

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Stop fetch batch on production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            BATCH_ID="${{ github.event.inputs.batch_id }}"
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm --no-deps web python manage.py shell -c "from celery import current_app; from django.utils import timezone; from harvest.models import FetchBatch, CompanyFetchRun; batch_id='$BATCH_ID'; qs=FetchBatch.objects.filter(status__in=['RUNNING','PARTIAL','PENDING']); batch=(FetchBatch.objects.filter(pk=int(batch_id)).first() if batch_id else qs.order_by('-created_at').first()); print('Target batch:', batch.pk if batch else None, batch.status if batch else None); now=timezone.now(); task_ids=[]; active=CompanyFetchRun.objects.none();\nif batch:\n    batch.stop_requested=True; batch.status=FetchBatch.Status.CANCELLED; batch.completed_at=batch.completed_at or now; batch.save(update_fields=['stop_requested','status','completed_at']);\n    active=CompanyFetchRun.objects.filter(batch=batch, status=CompanyFetchRun.Status.RUNNING).exclude(task_id='').exclude(task_id=None); task_ids=list(active.values_list('task_id', flat=True));\n    if batch.task_id:\n        current_app.control.revoke(batch.task_id, terminate=True, signal='SIGTERM')\n    if task_ids:\n        current_app.control.revoke(task_ids, terminate=True, signal='SIGTERM'); active.update(status=CompanyFetchRun.Status.SKIPPED, completed_at=now)\n    print('Stopped batch:', batch.pk, 'revoked:', len(task_ids))"
