name: Ops - Stop Fetch Batch

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: "FetchBatch id to stop; blank stops latest active batch"
        required: false
        default: ""

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Stop fetch batch on production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            cd /opt/consulting
            git pull --ff-only origin main
            BATCH_ID="${{ github.event.inputs.batch_id }}"
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm --no-deps web \
              python manage.py stop_fetch_batch --batch-id "${BATCH_ID:-0}"
