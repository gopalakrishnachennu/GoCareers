version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consulting}
      POSTGRES_USER: ${POSTGRES_USER:-consulting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Enable AOF persistence so the Celery task queue survives container restarts/redeploys.
    # Without this, restarting Redis wipes all queued tasks and in-progress batches lose
    # their remaining work (they stay RUNNING but the queue is empty — zombie batches).
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build: .
    # If you publish images (recommended), set IMAGE in Coolify and remove build.
    image: ${IMAGE:-consulting-web:local}
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-chennu.co,www.chennu.co}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://chennu.co,https://www.chennu.co}
      SITE_URL: ${SITE_URL:-https://chennu.co}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-120}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      HARVEST_PUSH_SECRET: ${HARVEST_PUSH_SECRET:-}
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8000:8000"   # localhost only — nginx proxies, never expose to internet
    volumes:
      - media_files:/app/media   # persist user uploads across deploys
    restart: unless-stopped

  # ── General worker: handles UI-triggered tasks, approvals, validation ────────
  # WORKER_CONCURRENCY default is conservative for a 2-vCPU VPS.
  celery_worker:
    build: .
    image: ${IMAGE_WORKER:-consulting-worker:local}
    command: >
      celery -A config worker -l info
      --concurrency=${WORKER_CONCURRENCY:-2}
      -Q default
      --hostname=worker@%h
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # ── Harvest worker: dedicated to batch scraping ───────────────────────────
  # HARVEST_CONCURRENCY — parallel Celery processes for company fetches.
  # Each process handles one company at a time (HTTP I/O bound).
  # Default is strict to protect web uptime on a small VPS.
  # Set HARVEST_CONCURRENCY in .env.production only after capacity is increased.
  celery_harvest:
    build: .
    image: ${IMAGE_WORKER:-consulting-worker:local}
    command: >
      celery -A config worker -l warning
      --concurrency=${HARVEST_CONCURRENCY:-4}
      -Q batches,harvest
      --hostname=harvest@%h
      --max-tasks-per-child=50
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
      HARVEST_CONCURRENCY: ${HARVEST_CONCURRENCY:-4}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    image: ${IMAGE_BEAT:-consulting-beat:local}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:     # Celery task queue — persists across container restarts/redeploys
  media_files:    # user-uploaded files — persists across container rebuilds
