version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consulting}
      POSTGRES_USER: ${POSTGRES_USER:-consulting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    # If you publish images (recommended), set IMAGE in Coolify and remove build.
    image: ${IMAGE:-consulting-web:local}
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-chennu.co,www.chennu.co}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://chennu.co,https://www.chennu.co}
      SITE_URL: ${SITE_URL:-https://chennu.co}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-120}
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8000:8000"   # localhost only — nginx proxies, never expose to internet
    volumes:
      - media_files:/app/media   # persist user uploads across deploys
    restart: unless-stopped

  # ── General worker: handles UI-triggered tasks, approvals, validation ────────
  # concurrency=3 on a 2-vCPU box — leaves headroom for web + postgres + redis.
  celery_worker:
    build: .
    image: ${IMAGE_WORKER:-consulting-worker:local}
    command: >
      celery -A config worker -l info
      --concurrency=3
      -Q default
      --hostname=worker@%h
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # ── Harvest worker: dedicated to batch scraping — intentionally throttled ────
  # concurrency=3 keeps CPU usage ≤80% on CX23 even during full 967-company scans.
  # The fetch_raw_jobs_for_company task has rate_limit="6/m" so each worker slot
  # processes ≤6 companies/min — total ≤18/min, ~54 min for a full scan vs
  # the previous 10-worker all-at-once approach that pegged CPU at 200%.
  celery_harvest:
    build: .
    image: ${IMAGE_WORKER:-consulting-worker:local}
    command: >
      celery -A config worker -l warning
      --concurrency=3
      -Q batches,harvest
      --hostname=harvest@%h
      --max-tasks-per-child=50
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    image: ${IMAGE_BEAT:-consulting-beat:local}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://consulting:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-consulting}}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "0"
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  media_files:    # user-uploaded files — persists across container rebuilds

