<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Chennu "C" with bindu (dot) — adapts to brand color via CSS currentColor -->
  <defs>
    <style>
      .bg { fill: var(--brand-nav-dark, #0f172a); }
      .icon { fill: #ffffff; }
    </style>
  </defs>
  <!-- Rounded square background -->
  <rect class="bg" width="512" height="512" rx="96" ry="96"/>
  <!-- "C" letterform with inner dot (bindu) -->
  <g transform="translate(256,256)">
    <!-- Outer C shape -->
    <path class="icon" d="M20,-140 A160,160,0,1,0,20,140 A24,24,0,0,1,20,96 A116,116,0,1,1,20,-96 A24,24,0,0,1,20,-140 Z"/>
    <!-- Bindu (dot) in center -->
    <circle class="icon" cx="-20" cy="0" r="32"/>
  </g>
</svg>
